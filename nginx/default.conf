upstream rabbitmq_http {
    server rabbitmq:15672;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        # Use $request_uri (raw, undecoded) instead of relying on nginx's
        # normalized $uri: RabbitMQ vhost paths use %2F for the default "/"
        # vhost, and nginx would otherwise decode it to a literal slash
        # before proxying, breaking the upstream route (404).
        proxy_pass         http://rabbitmq_http$request_uri;
        proxy_set_header   Host            rabbitmq:15672;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /orchestrator/ {
        proxy_pass         http://orchestrator:3000/;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# Root-level passthrough to RabbitMQ's management HTTP API, for third-party
# clients that expect it at its natural paths (e.g. /api/queues/...) instead
# of the /orchestrator-prefixed proxy above.
server {
    listen 15672;
    server_name _;

    location / {
        # See the /api/ location above for why $request_uri is used here.
        proxy_pass         http://rabbitmq_http$request_uri;
        proxy_set_header   Host            rabbitmq:15672;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
